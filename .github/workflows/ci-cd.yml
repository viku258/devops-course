name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Give Maven wrapper permission
        run: chmod +x ./mvnw

      - name: Compile project
        run: ./mvnw compile --batch-mode --errors --fail-at-end --show-version

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Give Maven wrapper permission
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw test --batch-mode --errors --fail-at-end --show-version

  quality:
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run CodeQL quality analysis
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  package:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Give Maven wrapper permission
        run: chmod +x ./mvnw

      - name: Package application
        run: ./mvnw package -DskipTests --batch-mode --errors --fail-at-end --show-version

  security:
    runs-on: ubuntu-latest
    needs: package
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0

  performance:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Test Railway app
        run: |
          echo "Testing: ${{ secrets.STAGING_URL }}"
          curl -I ${{ secrets.STAGING_URL }}

      - name: Apache Benchmark test
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2-utils
          ab -n 100 -c 10 ${{ secrets.STAGING_URL }}/
